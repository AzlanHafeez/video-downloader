<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Video Downloader - No Watermark</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; background: #0f172a; color: white; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-text { background: linear-gradient(to right, #00f2fe, #4facfe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .loader { border-top-color: #3498db; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Custom styles for progress state */
        .downloading { pointer-events: none; opacity: 0.7; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Header Section -->
    <div class="text-center mb-8">
        <h1 class="text-4xl md:text-5xl font-bold mb-2">TikTok <span class="gradient-text">Downloader</span></h1>
        <p class="text-gray-400">Paste TikTok link to download video without watermark</p>
    </div>

    <!-- Main Container -->
    <div class="w-full max-w-2xl glass p-6 rounded-3xl shadow-2xl">
        
        <!-- Input Area -->
        <div class="flex flex-col md:flex-row gap-3 mb-6">
            <input type="text" id="videoUrl" placeholder="https://www.tiktok.com/@user/video/..." 
                class="flex-1 bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 text-white">
            <button onclick="fetchVideo()" id="downloadBtn" 
                class="bg-blue-600 hover:bg-blue-700 transition-all px-8 py-3 rounded-xl font-bold flex items-center justify-center">
                <span id="btnText">Get Video</span>
                <div id="loader" class="hidden loader w-5 h-5 border-2 border-slate-200 rounded-full ml-2"></div>
            </button>
        </div>

        <!-- Result Area (Hidden by default) -->
        <div id="resultContainer" class="hidden animate-fade-in">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 items-start">
                
                <!-- Preview Image -->
                <div class="relative group overflow-hidden rounded-2xl">
                    <img id="videoCover" src="" alt="Thumbnail" class="w-full h-auto object-cover rounded-2xl transform transition duration-500 group-hover:scale-110">
                    <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity bg-black/40">
                         <i class="fas fa-play text-4xl text-white"></i>
                    </div>
                </div>

                <!-- Info and Buttons -->
                <div class="flex flex-col gap-4">
                    <h2 id="videoTitle" class="text-lg font-semibold line-clamp-3">Video Title</h2>
                    <div class="flex items-center gap-2 text-sm text-gray-400">
                        <i class="fas fa-user-circle"></i>
                        <span id="authorName">Author</span>
                    </div>

                    <div class="space-y-3 mt-4">
                        <button onclick="forceDownload('hdLink')" id="hdBtn" class="flex items-center justify-between w-full bg-emerald-600 hover:bg-emerald-700 p-3 rounded-xl transition-all">
                            <span id="hdText"><i class="fas fa-video mr-2"></i> No Watermark (HD)</span>
                            <i class="fas fa-download"></i>
                        </button>
                        <button onclick="forceDownload('sdLink')" id="sdBtn" class="flex items-center justify-between w-full bg-blue-600 hover:bg-blue-700 p-3 rounded-xl transition-all">
                            <span id="sdText"><i class="fas fa-film mr-2"></i> No Watermark (SD)</span>
                            <i class="fas fa-download"></i>
                        </button>
                        <button onclick="forceDownload('musicLink')" id="musicBtn" class="flex items-center justify-between w-full bg-slate-700 hover:bg-slate-600 p-3 rounded-xl transition-all">
                            <span id="musicText"><i class="fas fa-music mr-2"></i> Download MP3</span>
                            <i class="fas fa-download"></i>
                        </button>
                    </div>
                </div>
            </div>
            
            <button onclick="resetApp()" class="w-full mt-6 text-gray-500 hover:text-white transition-colors text-sm">
                <i class="fas fa-redo mr-1"></i> Clear & Paste New Link
            </button>
        </div>

        <!-- Error Message -->
        <div id="errorBox" class="hidden mt-4 p-3 bg-red-500/20 border border-red-500 rounded-xl text-red-500 text-sm text-center">
            Galti! Link sahi nahi hai ya API ka masla hai.
        </div>

    </div>

    <!-- Hidden Links Store -->
    <div id="linksStore" class="hidden" data-hd="" data-sd="" data-music=""></div>

    <!-- Footer -->
    <footer class="mt-8 text-gray-500 text-xs text-center">
        Powered by TikWM API | Developed with ❤️
    </footer>

    <script>
        // Store video title for filename
        let currentFileName = "tiktok-video";

        async function fetchVideo() {
            const urlInput = document.getElementById('videoUrl').value.trim();
            const btn = document.getElementById('downloadBtn');
            const btnText = document.getElementById('btnText');
            const loader = document.getElementById('loader');
            const resultBox = document.getElementById('resultContainer');
            const errorBox = document.getElementById('errorBox');

            if (!urlInput) {
                showError("Meherbani karkay link paste karein!");
                return;
            }

            btn.disabled = true;
            btnText.innerText = "Processing...";
            loader.classList.remove('hidden');
            resultBox.classList.add('hidden');
            errorBox.classList.add('hidden');

            try {
                const response = await fetch(`https://www.tikwm.com/api/?url=${encodeURIComponent(urlInput)}`);
                const result = await response.json();

                if (result.code === 0 && result.data) {
                    const videoData = result.data;
                    currentFileName = (videoData.title || "tiktok_video").substring(0, 30).replace(/[^a-z0-9]/gi, '_');

                    document.getElementById('videoCover').src = videoData.cover;
                    document.getElementById('videoTitle').innerText = videoData.title || "TikTok Video";
                    document.getElementById('authorName').innerText = "@" + (videoData.author.unique_id || "tiktok_user");
                    
                    // Save URLs to data attributes
                    const store = document.getElementById('linksStore');
                    store.setAttribute('data-hdLink', videoData.hdplay || videoData.play);
                    store.setAttribute('data-sdLink', videoData.play);
                    store.setAttribute('data-musicLink', videoData.music);

                    resultBox.classList.remove('hidden');
                } else {
                    showError(result.msg || "Video nahi mili. Link check karein.");
                }
            } catch (error) {
                showError("Network error! API tak rasai nahi ho rahi.");
            } finally {
                btn.disabled = false;
                btnText.innerText = "Get Video";
                loader.classList.add('hidden');
            }
        }

        // Functional download logic
        async function forceDownload(type) {
            const url = document.getElementById('linksStore').getAttribute(`data-${type}`);
            const btnId = type === 'hdLink' ? 'hdBtn' : (type === 'sdLink' ? 'sdBtn' : 'musicBtn');
            const textId = type === 'hdLink' ? 'hdText' : (type === 'sdLink' ? 'sdText' : 'musicText');
            
            const btn = document.getElementById(btnId);
            const textElement = document.getElementById(textId);
            const originalText = textElement.innerHTML;

            if (!url) return;

            try {
                btn.classList.add('downloading');
                textElement.innerHTML = `<i class="fas fa-spinner fa-spin mr-2"></i> Downloading...`;

                const response = await fetch(url);
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = blobUrl;
                
                // Set extension based on type
                const ext = type === 'musicLink' ? 'mp3' : 'mp4';
                a.download = `${currentFileName}_${type}.${ext}`;
                
                document.body.appendChild(a);
                a.click();
                
                // Cleanup
                window.URL.revokeObjectURL(blobUrl);
                document.body.removeChild(a);
            } catch (e) {
                console.error("Download failed", e);
                // Fallback: Open in new tab if blob fails
                window.open(url, '_blank');
            } finally {
                btn.classList.remove('downloading');
                textElement.innerHTML = originalText;
            }
        }

        function showError(msg) {
            const errorBox = document.getElementById('errorBox');
            errorBox.innerText = msg;
            errorBox.classList.remove('hidden');
        }

        function resetApp() {
            document.getElementById('videoUrl').value = '';
            document.getElementById('resultContainer').classList.add('hidden');
            document.getElementById('errorBox').classList.add('hidden');
        }

        document.getElementById('videoUrl').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') fetchVideo();
        });
    </script>
</body>
</html>
